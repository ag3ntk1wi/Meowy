<!DOCTYPE html>
<html>
<head>
    <title>Meowy - Cat Food Store</title>
    <style>
        body {
            font-family: Arial;
            background: #f7f7f7;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .brand {
            color: gray;
            font-size: 12px;
        }
    </style>
</head>

<body>

<h1>Meowy Cat Food Store</h1>

<div class="container">

    {% for product in products %}
    <div class="card">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p class="brand">{{ product.brand }}</p>
    </div>
    {% endfor %}

</div>

</body>
</html>
